spring.application.name=chat-realtime

server.address=0.0.0.0
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/chat_app?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
spring.datasource.username=chat_user
spring.datasource.password=chat_pass

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration


# JWT auth for local/dev. Override APP_JWT_SECRET in production with a strong random secret (>=32 bytes).
app.jwt.secret=${APP_JWT_SECRET:dev-only-change-me-dev-only-change-me-32-bytes-min}
app.jwt.ttl-seconds=${APP_JWT_TTL_SECONDS:86400}
